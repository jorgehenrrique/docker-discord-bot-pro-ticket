# Uso local: copie .env.example para .env, preencha BOT_TOKEN, GUILD_ID, DISCORD_CLIENT_SECRET, etc.
# MongoDB aqui é só para desenvolvimento; no Railway use o plugin MongoDB gerenciado (ver README).
services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: changeme
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    image: ghcr.io/jorgehenrrique/pro-ticket-bot:latest
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"

volumes:
  mongodb_data:
